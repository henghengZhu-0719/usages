services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # 把 NAS 上笔记文件夹换成你自己的实际路径，只读挂载避免误写
      - /vol1/1000/PLT:/notes:ro
    environment:
      # 留空则不启用鉴权；建议远程访问时设置这两个变量
      AUTH_USER: ""
      AUTH_PASS: ""
    restart: unless-stopped

  frontend:
    build:
      context: ./web
    ports:
      - "8000:80"
    depends_on:
      - backend
    restart: unless-stopped
